<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title><!-- FILL: comparison title --></title>
<style>
:root{--fg:#1a1a1a;--muted:#6b7280;--bg:#fff;--card:#f7f7f8;--border:#e5e7eb;--accent:#2563eb;--accent-bg:#eff6ff;--ok:#16a34a;--warn:#d97706;--err:#dc2626}
@media(prefers-color-scheme:dark){:root{--fg:#e7e7e9;--muted:#9ca3af;--bg:#16171a;--card:#1f2125;--border:#2d2f36;--accent:#60a5fa;--accent-bg:#1e293b;--ok:#4ade80;--warn:#fbbf24;--err:#f87171}}
*{box-sizing:border-box}
body{font:16px/1.6 system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--fg);background:var(--bg);max-width:760px;margin:0 auto;padding:3rem 1.5rem 5rem}
h1{font-size:1.5rem;margin:0 0 .25rem}
.meta{color:var(--muted);font-size:.85rem;margin:0 0 1.5rem}
.tldr{background:var(--accent-bg);border-left:3px solid var(--accent);padding:1rem 1.25rem;border-radius:0 8px 8px 0;margin:0 0 1.5rem}
table{border-collapse:collapse;width:100%;margin:1rem 0;font-size:.92rem}
th,td{text-align:left;padding:.55rem .7rem;border-bottom:1px solid var(--border);vertical-align:top}
th{color:var(--muted);font-weight:600}
tr.recommended{background:var(--accent-bg)}
tr.recommended td:first-child{border-left:3px solid var(--accent);font-weight:600}
.tag{font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;margin-left:.4rem}
.ok{color:var(--ok)}.warn{color:var(--warn)}.err{color:var(--err)}
code{background:var(--card);padding:.1em .35em;border-radius:4px;font-size:.9em}
</style>
</head>
<body>
<h1><!-- FILL: comparison title --></h1>
<p class="meta"><!-- FILL: what is being compared, for what decision --></p>

<div class="tldr"><strong>Recommendation:</strong> <!-- FILL: which option and why, one sentence --></div>

<!-- FILL: one column per criterion. Mark the recommended row with class="recommended". -->
<table>
  <thead>
    <tr><th>Option</th><th>Criterion A</th><th>Criterion B</th><th>Tradeoff</th></tr>
  </thead>
  <tbody>
    <tr class="recommended"><td>Option 1<span class="tag">pick</span></td><td>…</td><td>…</td><td>…</td></tr>
    <tr><td>Option 2</td><td>…</td><td>…</td><td>…</td></tr>
    <tr><td>Option 3</td><td>…</td><td>…</td><td>…</td></tr>
  </tbody>
</table>

<p class="meta"><!-- FILL (optional): one line on what would change the recommendation --></p>
</body>
</html>
