# Low Load theme for Ghostty — cognitive-load + dyslexia friendly.
# Mirrors the Alacritty low-load theme. Requires JetBrains Mono installed
# (https://www.jetbrains.com/lp/mono/). The installer can wire this in for you,
# or add `config-file = /path/to/low-load.conf` to ~/.config/ghostty/config.
#
# Rationale: legible mono font, comfortable size, generous leading, gentle
# (non-halation) contrast, steady cursor, breathing-room padding, bold as weight.

font-family = JetBrains Mono
font-size = 14

# Extra vertical leading (~1.3 line height) reduces line-blending. Tune to taste.
adjust-cell-height = 25%

# Steady block cursor: easy to locate, no blink distraction.
cursor-style = block
cursor-style-blink = false

# Padding gives text room to breathe and eases place-finding after an interruption.
window-padding-x = 18
window-padding-y = 16
window-padding-balance = true

# Off-black bg + warm off-white fg — avoids the pure #000/#fff halation that
# strains tired / dyslexic / low-vision reading, while keeping high (~12:1) contrast.
background = #1e1e22
foreground = #d6d3cd
cursor-color = #e8b339
cursor-text = #1e1e22

# Bold stays a weight, not a color shift.
bold-is-bright = false

# 16-color palette (0-7 normal, 8-15 bright).
palette = 0=#2a2a2f
palette = 1=#e06c75
palette = 2=#8cc265
palette = 3=#e5c07b
palette = 4=#61afef
palette = 5=#c678dd
palette = 6=#56b6c2
palette = 7=#d6d3cd
palette = 8=#5c6370
palette = 9=#e06c75
palette = 10=#8cc265
palette = 11=#e5c07b
palette = 12=#61afef
palette = 13=#c678dd
palette = 14=#56b6c2
palette = 15=#efeae3
